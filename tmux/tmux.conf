set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  Config reloaded"

# ── General ───────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S — #W"
set -sg escape-time 0
set -g history-limit 10000

# ── Vi mode ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ── Pane navigation ───────────────────────────────────────────────────────────
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind -n S-Left  previous-window
bind -n S-Right next-window

bind -   split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# ── Gruvbox Dark Hard — warm amber & wood palette ─────────────────────────────
#
#  BG_HARD  #1d2021    BG0      #282828    BG1      #3c3836
#  BG2      #504945    BG3      #665c54    FG       #ebdbb2
#  GRAY     #928374    ORANGE   #fe8019    YELLOW   #fabd2f
#  GREEN    #b8bb26    AQUA     #8ec07c    BLUE     #83a598
#  RED      #fb4934    PURPLE   #d3869b
#
#  Segment tints (subtle hue shifts on BG_HARD for each stat):
#    uptime  #1d2321  teal-dark     load    #252219  brown-dark
#    cpu     #2a2014  amber-dark    ram     #252519  olive-dark
#    disk    #1d2719  green-dark    battery #28191a  red-dark

set -g status on
set -g status-interval 4
set -g status-position bottom
set -g status-justify  left
set -g status-left-length  40
set -g status-right-length 140

# Base bar — gruvbox hard dark
set -g status-style "bg=#1d2021,fg=#928374"

# ── Left: session pill ────────────────────────────────────────────────────────
#   [  session ]►  in warm orange
set -g status-left \
  "#[bg=#fe8019,fg=#1d2021,bold]  #{session_name} \
#[bg=#1d2021,fg=#fe8019,nobold]"

# ── Windows — rounded powerline caps ( /  from nerd fonts e0b4/e0b6) ─────────
set -g window-status-separator ""

# inactive  ·  1  zsh  ·
set -g window-status-format \
  "#[bg=#1d2021,fg=#3c3836]\
#[bg=#3c3836,fg=#928374] #I  #W#{?window_zoomed_flag,  ,} \
#[bg=#1d2021,fg=#3c3836]"

# active  ·  1  nvim  ·  (orange index, cream label, bold)
set -g window-status-current-format \
  "#[bg=#1d2021,fg=#504945]\
#[bg=#504945,fg=#fe8019,bold] #I #[fg=#ebdbb2] #W#{?window_zoomed_flag, 󰊓 ,} \
#[bg=#1d2021,fg=#504945,nobold]"

# ── Right: 6 stat segments + clock + date  ────────────────────────────────────
#
#  ◄ uptime ◄ load ◄ cpu ◄ ram ◄ disk ◄ bat ◄  time ◄  date
#
#  Arrows:  (U+E0B2, solid left) between each segment.
#  Each arrow: #[bg=NEXT,fg=CURR]◄  — draws CURR-coloured left-triangle on NEXT bg.

set -g status-right \
  "#[bg=#1d2021,fg=#1d2321]\
#[bg=#1d2321,fg=#83a598] 󰔄 #(~/.config/tmux/scripts/uptime.sh) \
#[bg=#252219,fg=#1d2321]\
#[bg=#252219,fg=#8ec07c]  #(~/.config/tmux/scripts/load.sh) \
#[bg=#2a2014,fg=#252219]\
#[bg=#2a2014,fg=#fe8019] 󰻠 #(~/.config/tmux/scripts/cpu.sh) \
#[bg=#252519,fg=#2a2014]\
#[bg=#252519,fg=#fabd2f] 󰍛 #(~/.config/tmux/scripts/mem.sh) \
#[bg=#1d2719,fg=#252519]\
#[bg=#1d2719,fg=#b8bb26] 󰋊 #(~/.config/tmux/scripts/disk.sh) \
#[bg=#28191a,fg=#1d2719]\
#[bg=#28191a,fg=#fb4934] #(~/.config/tmux/scripts/battery.sh) \
#[bg=#3c3836,fg=#28191a]\
#[bg=#3c3836,fg=#ebdbb2]  %H:%M \
#[bg=#fe8019,fg=#3c3836]\
#[bg=#fe8019,fg=#1d2021,bold]  %a %d %b "

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#504945"
set -g pane-active-border-style "fg=#fe8019"
set -g pane-border-lines        single

# ── Messages / command prompt ─────────────────────────────────────────────────
set -g message-style         "bg=#3c3836,fg=#fabd2f,bold"
set -g message-command-style "bg=#3c3836,fg=#8ec07c"

# ── Copy / selection highlight ────────────────────────────────────────────────
set -g mode-style "bg=#504945,fg=#ebdbb2"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'
